name: Publish

on:
  release:
    types: [published]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.10

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run tests
        run: uv run pytest tests

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish
